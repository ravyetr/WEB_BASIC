<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsibility</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: red;
         }
        
        @media(max-width: 768px){
             .box{
                background-color: blue;
             }
        } 
    </style>
    
</head>
<body>
    <!-- break point 
        1200px : màn hình desktop lớn
        992px:  
        768px:
        576px: màn hình điện thoại
        @media(max-width: 768){

        } 
    -->
    <div class="box">
        box
    </div>
</body>
</html>
