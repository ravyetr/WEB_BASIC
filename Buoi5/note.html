<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=a, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            text-decoration: none;
            position: relative;
            color: black;
        }
        /* after phần tử giả, không có kích thước nên content : "AAAAAA" không ăn theo */
        a::after{
            content: "";
            position: absolute;
            left: 0px;
            top: 18px;
            width: 0px;
            height: 2px;
            background-color:black ;
            transition: 1s;
        }
        a:hover::after{
            width: 100%;
        }
        button{
            position: relative;
            padding: 20px;
            border: 4px solid;
            background-color: aquamarine;
            /* z-index số càng lớn thì sẽ nằm đè lên càng trên trong cái position: absolute;*/
            z-index: 1;
            overflow: hidden;
        }
        button::before{
            content: "";
            position: absolute;
            left: -100%;
            top:0;
            width: 100%;
            height: 100%;
            transition: 1s;
            background-color: black;
            z-index: -1;
        }
        button:hover::before{
            left: 0;
        }
        button:hover{
            color: white;
        }
    </style>
</head>
<body>
    <a href="">HOME</a>
    <button>
        Click me
    </button>
</body>
</html>
